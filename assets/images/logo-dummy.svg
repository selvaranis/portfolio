<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#CC3333;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ee5555;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="50" cy="50" r="48" fill="url(#grad1)" opacity="0.1" stroke="#CC3333" stroke-width="2"/>
  
  <!-- P letter -->
  <g transform="translate(50, 50)">
    <text x="0" y="15" font-family="Orbitron, sans-serif" font-size="48" font-weight="bold" fill="#CC3333" text-anchor="middle">P</text>
  </g>
</svg>
