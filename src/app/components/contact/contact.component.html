<section class="contact-section" [@slideInAnimation]>
  <h2 class="section-title">Get In Touch</h2>

  <div class="contact-container">
    <!-- Contact Form -->
    <div class="contact-form-box">
      <h3 class="form-title">Send Me a Message</h3>

      <div *ngIf="successMessage" class="success-message">
        {{ successMessage }}
      </div>
      <div *ngIf="errorMessage" class="error-message">
        {{ errorMessage }}
      </div>
      <form (ngSubmit)="onSubmit()" #contactForm="ngForm">
        <div class="form-row">
          <div class="form-group">
            <label for="name">Name <span class="mandate">*</span></label>
            <input
              type="text"
              id="name"
              name="name"
              [(ngModel)]="formData.name"
              placeholder="Your name"
              required
            />
          </div>

          <div class="form-group">
            <label for="email">Email <span class="mandate">*</span></label>
            <input
              type="email"
              id="email"
              name="email"
              [(ngModel)]="formData.email"
              placeholder="your@email.com"
              required
            />
          </div>
        </div>

        <div class="form-group">
          <label for="subject">Subject</label>
          <input
            type="text"
            id="subject"
            name="subject"
            [(ngModel)]="formData.subject"
            placeholder="Message subject"
          />
        </div>

        <div class="form-group">
          <label for="message">Message <span class="mandate">*</span></label>
          <textarea
            id="message"
            name="message"
            [(ngModel)]="formData.message"
            placeholder="Your message..."
            rows="5"
            required
          ></textarea>
        </div>

        <button type="submit" class="submit-button">Send Message</button>
      </form>
    </div>
  </div>
</section>
