<div class="app-container">
  <!-- Fixed Header -->
  <header class="fixed-header" #header>
    <div class="header-content">
      <div class="header-left">
        <div class="header-title">
          <h1>Selvarani D</h1>
          <p class="header-subtitle">Senior Frontend Developer (Angular)</p>
        </div>
        <div class="header-contact">
          <a href="mailto:{{ contactData.email }}" class="contact-link">
            <span class="contact-icon">📧</span>
            <span class="contact-text">{{ contactData.email }}</span>
          </a>
          <span class="divider">|</span>
          <a href="tel:+919843279698" class="contact-link">
            <span class="contact-icon">📱</span>
            <span class="contact-text">{{ contactData.phone }}</span>
          </a>
        </div>
      </div>
      <button
        class="hamburger-menu"
        (click)="toggleMobileMenu()"
        [class.active]="isMobileMenuOpen"
      >
        <span></span>
        <span></span>
        <span></span>
      </button>
    </div>
  </header>

  <!-- Right Sidebar Navigation -->
  <div class="app-layout">
    <aside
      class="sidebar"
      [class.mobile-open]="isMobileMenuOpen"
      [style.top.px]="headerHeight"
    >
      <nav class="nav-menu">
        <ul class="menu-list">
          <li
            *ngFor="let item of menuItems"
            class="menu-item"
            [class.active]="activeMenu === item.name"
            [@menuItemAnimation]="getMenuState(item.name)"
            (click)="selectMenu(item.name)"
            [attr.role]="'menuitem'"
            [attr.tabindex]="'0'"
            [attr.aria-current]="activeMenu === item.name ? 'page' : null"
          >
            <span class="menu-icon">{{ item.icon }}</span>
            <span class="menu-label">{{ item.label }}</span>
          </li>
        </ul>
      </nav>

      <div class="sidebar-footer">
        <p class="footer-text">© 2026</p>
      </div>
    </aside>

    <!-- Mobile Menu Overlay -->
    <div
      class="mobile-overlay"
      *ngIf="isMobileMenuOpen"
      (click)="isMobileMenuOpen = false"
    ></div>

    <!-- Main Content Area -->
    <main class="content-area">
      <div class="content-wrapper" [@contentAnimation]>
        <app-about *ngIf="activeMenu === 'about'"></app-about>
        <app-experience *ngIf="activeMenu === 'experience'"></app-experience>
        <app-skills *ngIf="activeMenu === 'skills'"></app-skills>
        <app-education *ngIf="activeMenu === 'education'"></app-education>
        <!-- <app-contact *ngIf="activeMenu === 'contact'"></app-contact> -->
      </div>
    </main>
  </div>
</div>
